<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f7f1e8" />
  <title>Radio Antomatee</title>

  <!-- Favicon (SVG, inline) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23d54d1d'/><stop offset='1' stop-color='%239a2e0a'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><circle cx='32' cy='36' r='5' fill='%23fffbf5'/><path d='M18 36a14 14 0 0 1 28 0' stroke='%23fffbf5' stroke-width='3' stroke-linecap='round' fill='none'/><path d='M11 36a21 21 0 0 1 42 0' stroke='%23fffbf5' stroke-width='2.5' stroke-linecap='round' fill='none' opacity='.55'/><circle cx='32' cy='17' r='2.4' fill='%23fffbf5'/></svg>" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- HLS for Polish Radio streams -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    :root {
      --bg: #f7f1e8;
      --bg-grain: #ede3d4;
      --surface: #fffbf5;
      --surface-2: #faf3e8;
      --surface-3: #f2e8d8;
      --border: #e8dcc8;
      --border-strong: #d8c8b0;
      --ink: #1a0f08;
      --ink-2: #3d2b1f;
      --muted: #8a7a6d;
      --muted-2: #b0a090;
      --accent: #c2410c;
      --accent-dark: #9a2e0a;
      --accent-soft: #fdf0e4;
      --ok: #15803d;
      --warn: #b8860b;
      --bad: #b91c1c;
      --shadow-sm: 0 1px 2px rgba(90,50,20,.05), 0 2px 8px rgba(90,50,20,.04);
      --shadow-md: 0 2px 6px rgba(90,50,20,.06), 0 10px 30px rgba(90,50,20,.08);
      --shadow-lg: 0 4px 12px rgba(90,50,20,.08), 0 20px 60px rgba(90,50,20,.12);
      --radius: 18px;
      --radius-sm: 10px;
      --radius-xs: 8px;
      --font-display: "Instrument Serif", Georgia, "Book Antiqua", serif;
      --font-ui: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      height: 100%;
      font-family: var(--font-ui);
      font-weight: 500;
      background: var(--bg);
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
      /* Subtle grain via layered radial gradients */
      background-image:
        radial-gradient(at 20% 10%, rgba(194,65,12,.05) 0, transparent 50%),
        radial-gradient(at 90% 80%, rgba(194,65,12,.04) 0, transparent 50%),
        radial-gradient(at 50% 50%, rgba(154,46,10,.02) 0, transparent 60%);
      background-attachment: fixed;
    }

    /* ══════════════════════════════════════════════════════════
       SHELL LAYOUT
    ══════════════════════════════════════════════════════════ */
    #shell {
      position: absolute;
      inset: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── HEADER ────────────────────────────────────────────── */
    #header {
      flex-shrink: 0;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      padding: 14px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brandGroup { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .brandMark {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      display: grid; place-items: center;
      box-shadow: 0 4px 12px rgba(194,65,12,.3), inset 0 1px 0 rgba(255,255,255,.2);
      flex-shrink: 0;
    }
    .brandMark svg { width: 26px; height: 26px; }

    .brandText { min-width: 0; }
    .brandTitle {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 400; line-height: 1;
      letter-spacing: -.5px; color: var(--ink);
    }
    .brandTitle em {
      color: var(--accent);
      font-style: italic;
    }
    .brandSub {
      font-size: 11px; font-weight: 500;
      color: var(--muted); margin-top: 4px;
      letter-spacing: .2px;
      display: flex; align-items: center; gap: 8px;
    }
    .liveDot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted-2); transition: background .3s;
    }
    .liveDot.ok {
      background: #22c55e;
      box-shadow: 0 0 0 0 rgba(34,197,94,.7);
      animation: pulse 2s infinite;
    }
    .liveDot.warn { background: var(--warn); animation: pulse-warn 1.3s infinite; }
    .liveDot.bad { background: var(--bad); }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,.6); }
      70%  { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
    @keyframes pulse-warn {
      0%,100% { opacity: 1; }
      50%     { opacity: .4; }
    }

    .toolbar { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    /* Circular control buttons in header */
    .ctrlBtn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--ink-2);
      display: grid; place-items: center;
      cursor: pointer; font-size: 13px;
      transition: all .18s ease;
      font-family: inherit;
    }
    .ctrlBtn:hover {
      background: var(--surface-2);
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }
    .ctrlBtn:active { transform: translateY(0); }
    .ctrlBtn svg { width: 16px; height: 16px; }

    .ctrlBtn.primary {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: #fff; border: none;
      box-shadow: 0 4px 16px rgba(194,65,12,.35);
    }
    .ctrlBtn.primary:hover {
      box-shadow: 0 6px 20px rgba(194,65,12,.45);
      transform: translateY(-1px);
    }
    .ctrlBtn.primary svg { width: 18px; height: 18px; }
    .ctrlBtn.playing {
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
      box-shadow: 0 4px 16px rgba(22,163,74,.35);
    }
    .ctrlBtn.playing:hover { box-shadow: 0 6px 20px rgba(22,163,74,.45); }

    /* Volume control */
    .volWrap {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px 8px 12px;
      border-radius: 24px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      height: 40px;
    }
    .volWrap svg { width: 16px; height: 16px; color: var(--muted); flex-shrink: 0; }
    .volSlider {
      -webkit-appearance: none; appearance: none;
      width: 90px; height: 4px;
      border-radius: 2px;
      background: var(--border-strong);
      outline: none; cursor: pointer;
    }
    .volSlider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(194,65,12,.4);
      transition: transform .15s;
    }
    .volSlider::-webkit-slider-thumb:hover { transform: scale(1.15); }
    .volSlider::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); border: none;
      cursor: pointer; box-shadow: 0 2px 6px rgba(194,65,12,.4);
    }
    .volLabel {
      font-size: 11px; font-weight: 600; color: var(--muted);
      min-width: 30px; text-align: right; font-variant-numeric: tabular-nums;
    }

    /* ── MAIN ──────────────────────────────────────────────── */
    #main {
      flex: 1;
      min-height: 0;
      display: flex;
      gap: 14px;
    }

    #leftPanel {
      flex: 1; min-width: 0;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #rightPanel {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* ── FILTERS + TOOLS (combined) ────────────────────────── */
    #filterSection {
      flex-shrink: 0;
      padding: 16px 18px 14px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .searchField {
      position: relative;
      margin-bottom: 10px;
    }
    .searchField svg {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      color: var(--muted-2);
      pointer-events: none;
    }
    .searchField input {
      width: 100%;
      padding: 11px 14px 11px 38px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-size: 13px; font-weight: 500;
      font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .searchField input::placeholder { color: var(--muted-2); }
    .searchField input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(194,65,12,.12);
    }

    .filterRow {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .select {
      flex: 1; min-width: 0;
      padding: 8px 10px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--ink-2);
      font-size: 12px; font-weight: 500;
      font-family: inherit;
      outline: none;
      cursor: pointer;
      transition: border-color .15s;
    }
    .select:hover { border-color: var(--border-strong); }
    .select:focus { border-color: var(--accent); }

    .chipBtn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 12px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px; font-weight: 600;
      font-family: inherit;
      color: var(--ink-2);
      cursor: pointer;
      user-select: none;
      transition: all .15s;
      white-space: nowrap;
    }
    .chipBtn:hover { background: var(--surface-2); border-color: var(--border-strong); }
    .chipBtn.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent-dark);
    }
    .chipBtn svg { width: 13px; height: 13px; }
    .chipBtn input[type=checkbox] { display: none; }

    .toolRow {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--border);
    }
    .toolRow .chipBtn { flex: 1; justify-content: center; }
    .chipBtn.danger:hover {
      background: #fef2f2;
      border-color: #fecaca;
      color: var(--bad);
    }

    /* ── LIST HEADER ───────────────────────────────────────── */
    #listHead {
      flex-shrink: 0;
      padding: 10px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 600;
      color: var(--muted);
      letter-spacing: .3px;
      display: flex; justify-content: space-between;
      text-transform: uppercase;
    }
    #countInfo { color: var(--ink-2); font-variant-numeric: tabular-nums; }
    #listHint { color: var(--muted-2); text-transform: none; letter-spacing: 0; font-weight: 500; }

    /* ── STATION LIST ──────────────────────────────────────── */
    #stationList {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--border-strong) transparent;
    }
    #stationList::-webkit-scrollbar { width: 6px; }
    #stationList::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
    #stationList::-webkit-scrollbar-track { background: transparent; }

    .row {
      padding: 12px 18px 12px 16px;
      border-bottom: 1px solid var(--surface-3);
      background: var(--surface);
      cursor: pointer;
      border-left: 3px solid transparent;
      display: flex; align-items: center; gap: 12px;
      transition: background .13s, border-color .13s;
      position: relative;
    }
    .row:hover { background: var(--surface-2); }
    .rowSelected { background: var(--surface-3) !important; }
    .rowActive {
      background: var(--accent-soft) !important;
      border-left-color: var(--accent) !important;
    }

    .rowStar {
      font-size: 18px;
      cursor: pointer;
      user-select: none;
      color: var(--muted-2);
      flex-shrink: 0;
      transition: color .15s, transform .15s;
      line-height: 1;
      padding: 4px;
    }
    .rowStar:hover { color: #eab308; transform: scale(1.15); }
    .starFav { color: #eab308 !important; }

    .rowInfo { flex: 1; min-width: 0; }
    .stationName {
      font-size: 14px; font-weight: 700;
      color: var(--ink); line-height: 1.25;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: center; gap: 6px;
    }
    .stationSub {
      margin-top: 3px;
      font-size: 11px; font-weight: 500;
      color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .stationSub .dot-sep { opacity: .4; margin: 0 4px; }
    .rowMeta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .rowKbps {
      font-size: 10px; font-weight: 600;
      color: var(--muted-2);
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--surface-2);
      font-variant-numeric: tabular-nums;
    }
    .rowActive .rowKbps { background: rgba(194,65,12,.1); color: var(--accent-dark); }

    /* Equalizer icon for active row */
    .miniEq {
      display: flex; align-items: flex-end;
      gap: 2px; height: 14px;
      color: var(--accent);
      flex-shrink: 0;
    }
    .miniEq span {
      display: block;
      width: 2.5px;
      background: currentColor;
      border-radius: 1px;
      animation: eqBar 1s ease-in-out infinite;
    }
    .miniEq span:nth-child(1) { height: 60%; animation-delay: -.8s; }
    .miniEq span:nth-child(2) { height: 100%; animation-delay: -.3s; }
    .miniEq span:nth-child(3) { height: 40%; animation-delay: -.6s; }
    .miniEq.paused span { animation-play-state: paused; opacity: .5; }

    @keyframes eqBar {
      0%,100% { transform: scaleY(0.25); }
      50%     { transform: scaleY(1); }
    }

    /* ── NOW PLAYING CARD ──────────────────────────────────── */
    .panelBlock {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 22px 20px;
      box-shadow: var(--shadow-md);
    }

    .panelTitle {
      font-size: 10px; font-weight: 700;
      color: var(--muted-2);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .panelTitle::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }

    /* Hero now-playing block */
    .npHero {
      position: relative;
      min-height: 200px;
    }

    .npArt {
      width: 100%;
      aspect-ratio: 1 / 1;
      max-height: 220px;
      border-radius: 14px;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,.15), transparent 60%),
        linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 70%, #5a1a04 100%);
      position: relative;
      overflow: hidden;
      margin-bottom: 18px;
      box-shadow: 0 10px 30px rgba(154,46,10,.25), inset 0 1px 0 rgba(255,255,255,.1);
    }

    /* Concentric radio-wave animation */
    .npArt::before, .npArt::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.18);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .npArt::before {
      width: 60%; height: 60%;
      animation: waveOut 3s ease-out infinite;
    }
    .npArt::after {
      width: 60%; height: 60%;
      animation: waveOut 3s ease-out infinite;
      animation-delay: 1.5s;
    }
    @keyframes waveOut {
      0%   { width: 20%; height: 20%; opacity: 1; }
      100% { width: 120%; height: 120%; opacity: 0; }
    }
    .npArt.idle::before, .npArt.idle::after {
      animation-play-state: paused;
      opacity: 0;
    }

    .npArtCenter {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 48%;
      text-align: center;
      color: #fff;
    }
    .npArtCenter .npArtMark {
      width: 46px; height: 46px;
      margin: 0 auto 6px;
      display: grid; place-items: center;
      background: rgba(255,255,255,.12);
      border-radius: 50%;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.2);
    }
    .npArtCenter .npArtMark svg { width: 22px; height: 22px; color: #fff; }
    .npArtStatus {
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: .9;
    }

    /* Live equalizer on art */
    .npEq {
      position: absolute;
      bottom: 14px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: flex-end;
      gap: 3px; height: 24px;
      opacity: .85;
    }
    .npEq span {
      display: block;
      width: 3px;
      background: #fff;
      border-radius: 2px;
      animation: eqBar 1s ease-in-out infinite;
    }
    .npEq span:nth-child(1) { height: 30%; animation-delay: -.9s; }
    .npEq span:nth-child(2) { height: 70%; animation-delay: -.2s; }
    .npEq span:nth-child(3) { height: 100%; animation-delay: -.6s; }
    .npEq span:nth-child(4) { height: 50%; animation-delay: -.4s; }
    .npEq span:nth-child(5) { height: 85%; animation-delay: -.1s; }
    .npEq.paused span { animation-play-state: paused; opacity: .4; }

    .npStation {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 400;
      line-height: 1.15;
      color: var(--ink);
      letter-spacing: -.3px;
      margin-bottom: 6px;
      word-break: break-word;
    }
    .npStation .idle { color: var(--muted-2); font-style: italic; }

    .npMeta {
      font-size: 12px; font-weight: 600;
      color: var(--muted);
      letter-spacing: .2px;
      margin-bottom: 14px;
    }

    .npTrackLabel {
      font-size: 9px; font-weight: 700;
      color: var(--muted-2);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 6px;
    }
    .npTrackDot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted-2);
    }
    .npTrackDot.on {
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(194,65,12,.5);
      animation: pulse-track 2s infinite;
    }
    @keyframes pulse-track {
      0%   { box-shadow: 0 0 0 0 rgba(194,65,12,.5); }
      70%  { box-shadow: 0 0 0 6px rgba(194,65,12,0); }
      100% { box-shadow: 0 0 0 0 rgba(194,65,12,0); }
    }

    .npTrack {
      font-size: 14px; font-weight: 600;
      color: var(--ink-2);
      line-height: 1.4;
      min-height: 20px;
      word-break: break-word;
      transition: opacity .3s;
    }
    .npTrack.empty {
      color: var(--muted-2);
      font-weight: 500;
      font-style: italic;
    }

    /* ── KEYBOARD HINTS ────────────────────────────────────── */
    .kbdList {
      display: flex; flex-direction: column; gap: 10px;
      font-size: 12px; color: var(--muted);
      font-weight: 500;
    }
    .kbdRow {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px;
    }
    .kbdRow .kbdLabel { color: var(--ink-2); font-weight: 500; }
    .kbdKeys { display: inline-flex; gap: 4px; flex-shrink: 0; }
    .kbdKey {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 22px; height: 22px;
      padding: 0 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      border-radius: 5px;
      font-size: 10px; font-weight: 700;
      color: var(--ink-2);
      font-family: inherit;
    }

    /* ══════════════════════════════════════════════════════════
       MOBILE PLAYER
    ══════════════════════════════════════════════════════════ */
    #mobilePlayer {
      display: none;
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      box-shadow: 0 -4px 24px rgba(90,50,20,.12);
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .mpInner {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
    }
    .mpArt {
      width: 48px; height: 48px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      display: grid; place-items: center;
      color: #fff; flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(194,65,12,.3);
      position: relative; overflow: hidden;
    }
    .mpArt .mpEq {
      display: flex; align-items: flex-end; gap: 2px; height: 18px;
    }
    .mpArt .mpEq span {
      display: block; width: 2.5px; background: #fff;
      border-radius: 1px;
      animation: eqBar 1s ease-in-out infinite;
    }
    .mpArt .mpEq span:nth-child(1) { height: 40%; animation-delay: -.6s; }
    .mpArt .mpEq span:nth-child(2) { height: 100%; animation-delay: -.2s; }
    .mpArt .mpEq span:nth-child(3) { height: 60%; animation-delay: -.4s; }
    .mpArt.paused .mpEq span { animation-play-state: paused; opacity: .5; }
    .mpArt svg { width: 22px; height: 22px; }

    .mpInfo { flex: 1; min-width: 0; }
    .mpName {
      font-size: 14px; font-weight: 700;
      color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mpMeta {
      font-size: 11px; font-weight: 500;
      color: var(--muted); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mpControls { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .mpBtn {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--surface-2);
      display: grid; place-items: center;
      cursor: pointer; flex-shrink: 0;
      color: var(--ink-2);
    }
    .mpBtn svg { width: 16px; height: 16px; }
    .mpBtnPlay {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      border: none; color: #fff;
      border-radius: 50%; display: grid; place-items: center;
      cursor: pointer; flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(194,65,12,.35);
    }
    .mpBtnPlay.playing {
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
      box-shadow: 0 3px 10px rgba(22,163,74,.35);
    }
    .mpBtnPlay svg { width: 18px; height: 18px; }

    /* ══════════════════════════════════════════════════════════
       MOBILE RESPONSIVE
    ══════════════════════════════════════════════════════════ */
    @media (max-width: 760px) {
      #shell { padding: 0; gap: 0; }
      #header {
        border-radius: 0;
        border: none;
        border-bottom: 1px solid var(--border);
        box-shadow: none;
        padding: 10px 14px;
      }
      .brandMark { width: 40px; height: 40px; border-radius: 10px; }
      .brandMark svg { width: 22px; height: 22px; }
      .brandTitle { font-size: 22px; }
      .brandSub { font-size: 10px; }
      .toolbar .ctrlBtn:not(.primary),
      .toolbar .volWrap { display: none; }
      .toolbar .ctrlBtn.primary { width: 44px; height: 44px; }

      #main { padding: 0; gap: 0; }
      #leftPanel {
        border-radius: 0;
        border: none;
        border-bottom: none;
        box-shadow: none;
      }
      #rightPanel { display: none; }

      #filterSection { padding: 10px 12px; }
      .searchField input { font-size: 14px; padding: 10px 14px 10px 36px; }
      .filterRow { gap: 5px; }
      .select, .chipBtn { font-size: 11px; padding: 7px 9px; }

      .row { padding: 12px 14px; }
      .stationName { font-size: 14px; }
      .rowKbps { display: none; }

      #stationList { padding-bottom: 110px; }
      #mobilePlayer { display: block; }
    }

    @media (min-width: 761px) {
      #mobilePlayer { display: none !important; }
    }

    /* Empty state */
    .emptyState {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted-2);
      font-size: 13px;
      font-weight: 500;
    }
    .emptyState .emptyIcon {
      margin: 0 auto 14px;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--surface-2);
      display: grid; place-items: center;
      color: var(--muted-2);
    }

    /* Loading shimmer */
    .loadingState {
      padding: 30px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }
    .loadingPulse {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 8px;
      animation: pulse-warn 1.2s infinite;
    }
  </style>
</head>
<body>

<div id="shell">

  <!-- HEADER -->

<script>
/* ══════════════════════════════════════════════════════════
   FALLBACK STREAMS (used if Radio Browser API is unavailable)
══════════════════════════════════════════════════════════ */
var FALLBACK_STREAMS = [
  "https://an.cdn.eurozet.pl/ant-web.mp3|Antyradio|Rock|PL|128|0",
  "https://rs9-krk2-cyfronet.rmfstream.pl/RMFFM48|RMF FM|Pop|PL|128|0",
  "https://rs7-krk2-cyfronet.rmfstream.pl/RMFMAXXX48|RMF MAXXX|Electronic|PL|128|0",
  "https://n17a-eu.rcs.revma.com/an1ugyygzk8uv|Radio 357|Pop|PL|128|0",
  "https://n37a-eu.rcs.revma.com/ypqt40u0x1zuv|Radio Nowy Świat|Alternative|PL|128|0",
  "https://radiostream.pl/tuba10-1.mp3|Tok FM|Talk-News|PL|128|0",
  "https://radiostream.pl/tuba8-1.mp3|Rock Radio|Rock|PL|128|0",
  "https://radiostream.pl/tuba38-1.mp3|Radio Pogoda|Pop|PL|128|0",
  "https://zt05.cdn.eurozet.pl/ZETDAN.mp3|Radio Zet Dance|Dance|PL|128|0",
  "https://stream11.polskieradio.pl/pr1/pr1.sdp/playlist.m3u8|Polskie Radio Jedynka|Easy Listening|PL|0|0",
  "https://stream12.polskieradio.pl/pr2/pr2.sdp/playlist.m3u8|Polskie Radio Dwójka|Classical|PL|0|0",
  "https://stream13.polskieradio.pl/pr3/pr3.sdp/playlist.m3u8|Polskie Radio Trójka|Pop|PL|0|0",
  "https://stream14.polskieradio.pl/pr4/pr4.sdp/playlist.m3u8|Polskie Radio Czwórka|Alternative|PL|0|0",
  "https://stream24.polskieradio.pl/pr24/pr24.sdp/playlist.m3u8|Polskie Radio 24|News|PL|0|0",
  "https://radio.truckers.fm/|TruckersFM|Sim Radio|EN|320|0"
];

/* Radio Browser API mirror list — used with round-robin + timeout for reliability */
var API_MIRRORS = [
  "https://de1.api.radio-browser.info",
  "https://de2.api.radio-browser.info",
  "https://fr1.api.radio-browser.info",
  "https://nl1.api.radio-browser.info",
  "https://at1.api.radio-browser.info"
];

/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
var state = {
  stations: [], view: [], favorites: {},
  selectedIndex: 0, activeId: "",
  volume: 65,
  filters: { q: "", country: "", genre: "", onlyFav: false, sort: "name" },
  connectTimer: null, connectToken: 0,
  currentTrack: "",
  metaController: null,
  metaTimer: null
};

/* ══════════════════════════════════════════════════════════
   AUDIO
══════════════════════════════════════════════════════════ */
var audioEl = null, audioState = 1, _stopping = false, hlsInstance = null;

function destroyHls(){ if(hlsInstance){try{hlsInstance.destroy();}catch(e){} hlsInstance=null;} }
function applyVolume(){ if(audioEl) try{ audioEl.volume=state.volume/100; }catch(e){} }

function getPlayer(){
  if(!audioEl){
    audioEl = new Audio();
    audioEl.preload = "none";
    audioEl.crossOrigin = "anonymous";
    audioEl.addEventListener("playing", function(){ applyVolume(); if(_stopping)return; audioState=3; onPlayStateChange(3); });
    audioEl.addEventListener("pause",   function(){ if(_stopping)return; audioState=2; onPlayStateChange(2); });
    audioEl.addEventListener("waiting", function(){ if(_stopping)return; audioState=6; onPlayStateChange(6); });
    audioEl.addEventListener("stalled", function(){ if(_stopping)return; audioState=11; onPlayStateChange(11); });
    audioEl.addEventListener("error",   function(){ if(_stopping)return; onPlayerError(); });
    audioEl.addEventListener("ended",   function(){ if(_stopping)return; audioState=1; onPlayStateChange(1); });
  }
  return audioEl;
}

/* ══════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════ */
function $(id){ return document.getElementById(id); }
function bind(el,evt,fn){ if(el) el.addEventListener(evt,fn,false); }
function stopEvt(e){ if(e.preventDefault)e.preventDefault(); if(e.stopPropagation)e.stopPropagation(); return false; }
function clamp(n,mn,mx){ n=parseInt(n,10); if(isNaN(n))n=mn; return n<mn?mn:n>mx?mx:n; }
function trim(s){ return ("" + (s==null?"":s)).replace(/^\s+|\s+$/g,""); }
function lower(s){ return trim(s).toLowerCase(); }
function safeText(s){ return ("" + (s==null?"":s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function isMobile(){ return window.innerWidth < 761; }
function uniqSort(arr){
  var map={},out=[];
  arr.forEach(function(v){ v=trim(v); if(v&&!map[v]){map[v]=1;out.push(v);} });
  return out.sort(function(a,b){ a=lower(a);b=lower(b);return a<b?-1:a>b?1:0; });
}
function hash32(str){
  var i,h=2166136261;
  for(i=0;i<str.length;i++){h^=str.charCodeAt(i);h=h+(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24);}
  return ("00000000"+(h>>>0).toString(16)).slice(-8);
}
function makeId(url,name){ return hash32(url+"|"+name); }

/* ══════════════════════════════════════════════════════════
   STATIONS PARSE & LOAD
══════════════════════════════════════════════════════════ */
function parseStations(raw){
  var out=[],seen={};
  raw.forEach(function(r){
    var p=(""+r).split("|");
    if(p.length<5) return;
    var url=trim(p[0]), name=trim(p[1]), genre=trim(p[2]), country=trim(p[3]), bitrate=parseInt(p[4],10)||0;
    if(!url||!name) return;
    var key=lower(url)+"|"+lower(name);
    if(seen[key]) return; seen[key]=1;
    out.push({id:makeId(url,name), url:url, name:name, genre:genre||"Inne", country:country||"?", bitrate:bitrate});
  });
  return out.sort(function(a,b){var an=lower(a.name),bn=lower(b.name);return an<bn?-1:an>bn?1:0;});
}

async function fetchWithTimeout(url, ms){
  var ctrl = (typeof AbortController !== "undefined") ? new AbortController() : null;
  var timer = setTimeout(function(){ if (ctrl) { try { ctrl.abort(); } catch(e){} } }, ms);
  try {
    var resp = await fetch(url, {
      headers: { "Accept": "application/json" },
      signal: ctrl ? ctrl.signal : undefined
    });
    return resp;
  } finally {
    clearTimeout(timer);
  }
}

/* Try each Radio Browser mirror in random order until one answers in time */
async function fetchFromAnyMirror(path, perMirrorMs){
  var mirrors = API_MIRRORS.slice();
  // Shuffle so we don't always hammer the same first mirror
  for (var i = mirrors.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = mirrors[i]; mirrors[i] = mirrors[j]; mirrors[j] = tmp;
  }
  for (var k = 0; k < mirrors.length; k++) {
    try {
      var resp = await fetchWithTimeout(mirrors[k] + path, perMirrorMs);
      if (resp && resp.ok) {
        var data = await resp.json();
        if (Array.isArray(data) && data.length > 0) return data;
      }
    } catch(e) { /* try next mirror */ }
  }
  return null;
}

async function loadAllStations(){
  var fallback = parseStations(FALLBACK_STREAMS);
  var apiStations = [];

  var apiData = await fetchFromAnyMirror(
    "/json/stations/search?countrycode=PL&lastcheckok=1&hidebroken=true&order=votes&reverse=true&limit=500",
    8000
  );

  if (apiData) {
    apiStations = apiData.filter(function(s){
      return s.url_resolved && /^https:\/\//i.test(s.url_resolved) && s.name && trim(s.name);
    }).map(function(s){
      var tags = (s.tags||"").split(","), genre="";
      for (var i=0;i<tags.length;i++){
        var t=trim(tags[i]);
        if(t){ genre = t.charAt(0).toUpperCase()+t.slice(1); break; }
      }
      return {
        id: makeId(s.url_resolved, trim(s.name)),
        url: s.url_resolved,
        name: trim(s.name),
        genre: genre || "Inne",
        country: "PL",
        bitrate: s.bitrate || 0
      };
    });
  }

  var seen={}, all=[];
  fallback.forEach(function(st){ if(!seen[st.id]){ seen[st.id]=1; all.push(st); }});
  apiStations.forEach(function(st){ if(!seen[st.id]){ seen[st.id]=1; all.push(st); }});
  all.sort(function(a,b){ var an=lower(a.name), bn=lower(b.name); return an<bn?-1:an>bn?1:0; });
  return all;
}

/* ══════════════════════════════════════════════════════════
   CONFIG (localStorage — survives reloads)
══════════════════════════════════════════════════════════ */
var STORAGE_KEY = "radioantomatee-config";
function loadConfig(){
  try {
    var raw = localStorage.getItem(STORAGE_KEY); if(!raw) return;
    var cfg = JSON.parse(raw);
    if(cfg.volume   != null) state.volume = clamp(cfg.volume,0,100);
    if(cfg.activeId)         state.activeId = "" + cfg.activeId;
    if(cfg.favorites)        state.favorites = cfg.favorites;
    if(cfg.sort)             state.filters.sort = "" + cfg.sort;
  } catch(e){}
}
var _saveT = null;
function debouncedSave(){ clearTimeout(_saveT); _saveT = setTimeout(saveConfig, 600); }
function saveConfig(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      version: 2,
      volume: state.volume,
      activeId: state.activeId,
      favorites: state.favorites,
      sort: state.filters.sort
    }));
  } catch(e){}
}

   PLAY BUTTON VISUAL
══════════════════════════════════════════════════════════ */
var ICON_PLAY  = '<path d="M7 5l12 7-12 7V5z"/>';
var ICON_PAUSE = '<rect x="6" y="5" width="4.5" height="14" rx="1"/><rect x="13.5" y="5" width="4.5" height="14" rx="1"/>';

function updatePlayButton(ps){
  var playing = (ps===3||ps===6||ps===9||ps===11);
  var paused  = (ps===2);

  var btn = $("btnPlay");
  var icon = $("btnPlayIcon");
  btn.classList.toggle("playing", playing);
  icon.innerHTML = playing ? ICON_PAUSE : ICON_PLAY;
  btn.title = playing ? "Pauza (spacja)" : "Graj (spacja)";

  var mbp = $("mpPlay"); var mbi = $("mpPlayIcon");
  if (mbp) {
    mbp.classList.toggle("playing", playing);
    if(mbi) mbi.innerHTML = playing ? ICON_PAUSE : ICON_PLAY;
  }

  // Equalizer animation states
  var npEq  = $("npEq"); if(npEq)  npEq.classList.toggle("paused", !playing);
  var npArt = $("npArt"); if(npArt) npArt.classList.toggle("idle", !playing);
  var mpArt = $("mpArt"); if(mpArt) mpArt.classList.toggle("paused", !playing);

/* ══════════════════════════════════════════════════════════
   NOW PLAYING RENDER
══════════════════════════════════════════════════════════ */
function setNowPlaying(st){
  if(!st){
    $("npStation").innerHTML = '<span class="idle">Wybierz stację</span>';
    $("npMeta").textContent = "—";
    $("npTrack").textContent = "—";
    $("npTrack").classList.add("empty");
    $("npTrackDot").classList.remove("on");
    $("mpName").textContent = "Wybierz stację";
    $("mpMeta").textContent = "—";
    return;
  }
  var meta = st.genre + " · " + st.country + (st.bitrate ? " · " + st.bitrate + " kbps" : "");
  $("npStation").textContent = st.name;
  $("npMeta").textContent = meta;
  $("mpName").textContent = st.name;
  $("mpMeta").textContent = meta;
  renderTrack();
}

function renderTrack(){
  var trackEl = $("npTrack");
  var dotEl = $("npTrackDot");
  var mpMeta = $("mpMeta");
  var st = getActiveStation();

  if (state.currentTrack) {
    trackEl.textContent = state.currentTrack;
    trackEl.classList.remove("empty");
    dotEl.classList.add("on");
    // On mobile player, show track title as subtitle when available
    if (mpMeta && st) mpMeta.textContent = state.currentTrack;
  } else {
    // Context-aware message
    var msg;
    if (!st) {
      msg = "—";
    } else if (/\.m3u8/i.test(st.url)) {
      // HLS streams (Polskie Radio) carry no track metadata
      msg = "HLS — brak metadanych w strumieniu";
    } else {
      msg = "Wczytywanie…";
    }
    trackEl.textContent = msg;
    trackEl.classList.add("empty");
    dotEl.classList.remove("on");
    if (mpMeta && st) {
      mpMeta.textContent = st.genre + " · " + st.country + (st.bitrate ? " · " + st.bitrate + " kbps" : "");
    }
  }
}

function getStationById(id){
  for (var i=0;i<state.stations.length;i++)
    if (state.stations[i].id === id) return state.stations[i];
  return null;
}
function getSelectedStation(){ return state.view[state.selectedIndex] || null; }
function getActiveStation(){ return state.activeId ? getStationById(state.activeId) : null; }

/* ══════════════════════════════════════════════════════════
   FILTERS
══════════════════════════════════════════════════════════ */
function fillSelect(id, fl, vals, sel){
  var el = $(id); el.length = 0;
  el.options[0] = new Option(fl, "");
  vals.forEach(function(v){ el.options[el.length] = new Option(v, v); });
  el.value = sel || "";
}
function renderFilterOptions(){
  var cc=[], gc=[];
  state.stations.forEach(function(s){ cc.push(s.country); gc.push(s.genre); });
  fillSelect("filterCountry", "Kraj: wszystkie",    uniqSort(cc), state.filters.country);
  fillSelect("filterGenre",   "Gatunek: wszystkie", uniqSort(gc), state.filters.genre);
  $("sortMode").value = state.filters.sort;
}
function sortView(list){
  var mode = state.filters.sort;
  list.sort(function(a,b){
    if (mode==="bitrate" && a.bitrate !== b.bitrate) return b.bitrate - a.bitrate;
    if (mode==="country") {
      var ac=lower(a.country), bc=lower(b.country);
      if (ac<bc) return -1; if (ac>bc) return 1;
    }
    var an=lower(a.name), bn=lower(b.name);
    return an<bn?-1:an>bn?1:0;
  });
}
function applyFilters(){
  var q       = lower(state.filters.q),
      country = state.filters.country,
      genre   = state.filters.genre,
      onlyFav = state.filters.onlyFav,
      out = [];
  state.stations.forEach(function(st){
    if (onlyFav && !state.favorites[st.id]) return;
    if (country && st.country !== country)  return;
    if (genre && st.genre !== genre)        return;
    if (q) {
      var h = lower(st.name + " " + st.genre + " " + st.country);
      if (h.indexOf(q) < 0) return;
    }
    out.push(st);
  });
  sortView(out);
  state.view = out;
  state.selectedIndex = clamp(state.selectedIndex, 0, Math.max(0, out.length - 1));
}

/* ══════════════════════════════════════════════════════════
   ROWS RENDER (URL hidden as requested)
══════════════════════════════════════════════════════════ */
var rowEls = [];
function rowClass(idx, st){
  var c = "row";
  if (idx === state.selectedIndex) c += " rowSelected";
  if (st.id === state.activeId)    c += " rowActive";
  return c;
}
function updateRowClasses(){
  for (var i=0;i<rowEls.length;i++)
    if (rowEls[i]) rowEls[i].className = rowClass(i, state.view[i]);
}

function renderList(){
  applyFilters();
  var html = [], list = $("stationList"), prev = 0;
  rowEls = [];
  try { prev = list.scrollTop; } catch(e){}
  $("countInfo").textContent = state.view.length + " / " + state.stations.length;
  $("listHint").textContent  = isMobile() ? "klik = uruchom" : "dwuklik = uruchom";

  if (!state.view.length) {
    list.innerHTML =
      '<div class="emptyState">' +
        '<div class="emptyIcon">' +
          '<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>' +
        '</div>' +
        'Brak stacji pasujących do filtrów' +
      '</div>';
    return;
  }

  state.view.forEach(function(st, i){
    var fav    = !!state.favorites[st.id];
    var active = (st.id === state.activeId);
    html.push(
      '<div class="' + rowClass(i, st) + '" data-row="1" data-index="' + i + '">' +
        '<span class="rowStar' + (fav ? ' starFav' : '') + '" data-action="fav" title="Ulubione">' + (fav ? '★' : '☆') + '</span>' +
        '<div class="rowInfo">' +
          '<div class="stationName">' + safeText(st.name) + '</div>' +
          '<div class="stationSub">' +
            safeText(st.genre) +
            '<span class="dot-sep">·</span>' +
            safeText(st.country) +
          '</div>' +
        '</div>' +
        '<div class="rowMeta">' +
          (st.bitrate ? '<span class="rowKbps">' + st.bitrate + 'k</span>' : '') +
          (active ? '<div class="miniEq' + ((audioState===3||audioState===6||audioState===11)?'':' paused') + '"><span></span><span></span><span></span></div>' : '') +
        '</div>' +
      '</div>'
    );
  });

  list.innerHTML = html.join("");
  list.scrollTop = prev;
  list.querySelectorAll("[data-index]").forEach(function(n){
    var idx = parseInt(n.getAttribute("data-index"), 10);
    if (!isNaN(idx)) rowEls[idx] = n;
  });
}

/* ══════════════════════════════════════════════════════════
   SELECTION
══════════════════════════════════════════════════════════ */
function selectIndex(idx, reveal){
  if (!state.view.length) { state.selectedIndex = 0; return; }
  state.selectedIndex = clamp(idx, 0, state.view.length - 1);
  updateRowClasses();
  if (reveal) {
    var r = rowEls[state.selectedIndex];
    if (r && r.scrollIntoView) r.scrollIntoView({ block: "nearest" });

}

/* ══════════════════════════════════════════════════════════
   CONNECT TIMER
══════════════════════════════════════════════════════════ */
function stopConnectTimer(){ clearTimeout(state.connectTimer); state.connectTimer = null; }
function armConnectTimer(){
  stopConnectTimer();
  state.connectToken++;
  var tok = state.connectToken;
  state.connectTimer = setTimeout(function(){
    if (tok !== state.connectToken) return;
    if (audioState !== 3) { setStatus("bad", "Nie udało się połączyć"); updatePlayButton(1); }
  }, 15000);
}

/* ══════════════════════════════════════════════════════════
   NOW-PLAYING / TRACK METADATA
   ----------------------------------------------------------
   Polish radio streams almost never set CORS headers, so a
   pure-browser app can't read ICY metadata directly from them.
   Strategy:
     1. RMF stations have a public JSON endpoint -> best quality
     2. Other MP3/AAC streams -> ICY metadata via CORS proxy
     3. HLS streams (.m3u8) carry no ICY metadata -> not supported
   ----------------------------------------------------------
   CORS proxy note: a tiny fraction of the stream (~16 KB per
   20 s) goes through corsproxy.io. Audio itself plays directly
   and never touches the proxy.
══════════════════════════════════════════════════════════ */

var CORS_PROXY = "https://corsproxy.io/?";

/* RMF station name -> id (for playlista_{id}.json.txt endpoint) */
var RMF_STATION_IDS = {
  "rmf fm": 5,
  "rmf maxxx": 6, "rmf maxx": 6,
  "rmf classic": 7,
  "radio rmf24": 190, "rmf24": 190, "rmf 24": 190,
  "rmf w pracy": 115,
  "rmf polskie przeboje": 9,
  "rmf dance": 3,
  "rmf classic rock": 2,
  "rmf gold": 15,
  "rmf 5 łagodne przeboje": 97, "rmf 5": 97,
  "rmf party": 23,
  "rmf disco polo": 110,
  "rmf relaks": 116
};

function stopMetaPolling(){
  if (state.metaController) {
    try { state.metaController.abort(); } catch(e){}
    state.metaController = null;
  }
  clearTimeout(state.metaTimer);
  state.metaTimer = null;
}

function updateCurrentTrack(title){
  title = trim(title || "");
  // Clean noise artifacts (e.g. "- ", "unknown", jingle placeholders)
  if (/^(unknown|n\/a|--?|null|\.|-)$/i.test(title)) title = "";
  // Common "jingle" / stinger patterns from some stations
  if (/^(jingle|id|sweep|liner|promo|reklama|spot)$/i.test(title)) title = "";
  if (title === state.currentTrack) return;
  state.currentTrack = title;
  renderTrack();
}

/* ── Provider 1: RMF group via rmfon.pl public JSON ──────── */
async function fetchRmfTrack(stationId, token, signal){
  var url = CORS_PROXY + encodeURIComponent(
    "https://www.rmfon.pl/stacje/playlista_" + stationId + ".json.txt"
  );
  var resp = await fetch(url, { signal: signal, cache: "no-store" });
  if (!resp.ok) return null;
  if (token !== state.connectToken) return null;
  var data = await resp.json();
  if (!Array.isArray(data) || !data.length) return null;
  // The "currently playing" track has order == 0 (most recent past < 0, upcoming > 0)
  var now = data.find(function(t){ return t.order === 0; });
  // Fallback: last track with order <= 0
  if (!now) {
    var past = data.filter(function(t){ return t.order <= 0; })
                   .sort(function(a,b){ return b.order - a.order; });
    now = past[0];
  }
  if (!now) return null;
  var artist = trim(now.author || "");
  var title  = trim(now.title || "");
  if (!artist && !title) return null;
  return artist ? (artist + " — " + title) : title;
}

/* ── Provider 2: Generic ICY metadata via CORS proxy ─────── */
async function fetchIcyTrack(streamUrl, token, signal){
  var proxied = CORS_PROXY + encodeURIComponent(streamUrl);
  var resp = await fetch(proxied, {
    headers: { "Icy-MetaData": "1" },
    signal: signal,
    cache: "no-store"
  });
  if (!resp.ok || !resp.body) return null;
  if (token !== state.connectToken) return null;

  var metaint = parseInt(resp.headers.get("icy-metaint") || "0", 10);
  if (!metaint) return null;

  var reader = resp.body.getReader();
  var buf = new Uint8Array(0);
  // metaint bytes of audio + 1 length byte + up to 16*255 bytes of metadata
  var maxNeeded = metaint + 16 * 255 + 1;
  var guard = 0;

  while (buf.length < maxNeeded && guard < 250) {
    guard++;
    var read = await reader.read();
    if (read.done) break;
    var combined = new Uint8Array(buf.length + read.value.length);
    combined.set(buf); combined.set(read.value, buf.length);
    buf = combined;
    if (token !== state.connectToken) break;
  }

  if (buf.length <= metaint) return null;
  var metaLen = buf[metaint] * 16;
  if (metaLen === 0) return null;
  var metaStr = new TextDecoder("utf-8", { fatal: false })
                  .decode(buf.slice(metaint + 1, metaint + 1 + metaLen));
  var m = metaStr.match(/StreamTitle='([^']*)'/);
  return m ? m[1] : null;
}

/* ── Dispatcher: pick best provider for this station ─────── */
function resolveProvider(station){
  if (!station) return null;
  var key = lower(station.name);
  if (key in RMF_STATION_IDS) {
    return { kind: "rmf", id: RMF_STATION_IDS[key] };
  }
  // Also match when the URL is on the RMF CDN
  if (/rmfstream\.pl/i.test(station.url)) {
    // Best-effort: match station name by RMF catalog prefix
    for (var k in RMF_STATION_IDS) {
      if (RMF_STATION_IDS.hasOwnProperty(k) && key.indexOf(k) !== -1) {
        return { kind: "rmf", id: RMF_STATION_IDS[k] };
      }
    }
  }
  // HLS streams don't carry ICY metadata
  if (/\.m3u8/i.test(station.url)) return null;
  return { kind: "icy" };
}

async function pollMetadata(station, token){
  // Cancel any in-flight request
  if (state.metaController) {
    try { state.metaController.abort(); } catch(e){}
  }
  var ctrl = new AbortController();
  state.metaController = ctrl;

  var prov = resolveProvider(station);
  if (!prov) { state.metaController = null; return; }

  try {
    var title = null;
    if (prov.kind === "rmf") {
      title = await fetchRmfTrack(prov.id, token, ctrl.signal);
    } else if (prov.kind === "icy") {
      title = await fetchIcyTrack(station.url, token, ctrl.signal);
    }
    try { ctrl.abort(); } catch(e){}
    if (state.metaController === ctrl) state.metaController = null;
    if (token !== state.connectToken) return;
    if (title) updateCurrentTrack(title);
  } catch(e){
    // Network / CORS / abort — fail silently, station still plays
    if (state.metaController === ctrl) state.metaController = null;
  }
}

function startMetaPolling(station){
  stopMetaPolling();
  updateCurrentTrack(""); // reset for new station

  if (!resolveProvider(station)) return; // HLS / unsupported

  var token = state.connectToken;
  var run = function(){
    if (token !== state.connectToken) return;
    pollMetadata(station, token);
    // RMF refreshes every ~30 s; ICY polling also 30 s to be gentle on the proxy
    state.metaTimer = setTimeout(run, 30000);
  };
  // First poll ~2 s after play so audio gets priority
  state.metaTimer = setTimeout(run, 2000);
}

/* ══════════════════════════════════════════════════════════
   PLAYBACK
══════════════════════════════════════════════════════════ */
function playUrl(url){
  try {
    var a = getPlayer(); _stopping = false; destroyHls();
    var isHls = /\.m3u8/i.test(url);

    if (isHls) {
      if (typeof Hls !== "undefined" && Hls.isSupported()) {
        hlsInstance = new Hls({ enableWorker: false });
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(a);
        hlsInstance.on(Hls.Events.MANIFEST_PARSED, function(){
          if (_stopping) return; applyVolume();
          var p = a.play();
          if (p && p.catch) p.catch(function(){ if (!_stopping) onPlayerError(); });
        });
        hlsInstance.on(Hls.Events.ERROR, function(ev, d){
          if (d.fatal && !_stopping) onPlayerError();
        });
        return true;
      } else if (a.canPlayType("application/vnd.apple.mpegurl")) {
        a.src = url; applyVolume();
        var p2 = a.play();
        if (p2 && p2.catch) p2.catch(function(){ if (!_stopping) onPlayerError(); });
        return true;
      } else {
        setStatus("bad", "HLS nieobsługiwany");
        return false;
      }
    }

    a.src = url; applyVolume();
    var p3 = a.play();
    if (p3 && p3.catch) p3.catch(function(){ if (!_stopping) onPlayerError(); });
    return true;
  } catch(e){ return false; }
}

function playStation(st){
  if (!st) return;
  state.activeId = st.id;
  state.currentTrack = "";
  saveConfig();
  setNowPlaying(st);
  setStatus("warn", "Łączenie…");
  updatePlayButton(6);

  if (!playUrl(st.url)) {
    setStatus("bad", "Nie udało się uruchomić");
    return;
  }
  armConnectTimer();
  startMetaPolling(st);
  updateRowClasses();
  renderList(); // refresh to show equalizer on the active row
}

function playSelected(){ var st = getSelectedStation(); if (st) playStation(st); }

function togglePlayPause(){
  if (!state.activeId) { playSelected(); return; }
  var a = getPlayer();

  if (audioState===3 || audioState===6 || audioState===9 || audioState===11) {
    _stopping = false; a.pause(); return;
  }

  var st = getActiveStation();
  if (!st) { playSelected(); return; }

  _stopping = false;
  if (a.src !== st.url) a.src = st.url;
  applyVolume();
  var p = a.play();
  if (p && p.catch) p.catch(function(){ onPlayerError(); });
  // Restart metadata polling when resuming
  startMetaPolling(st);
}

function stopPlayback(){
  stopConnectTimer();
  stopMetaPolling();
  _stopping = true;
  destroyHls();
  try {
    var a = getPlayer();
    a.pause(); a.removeAttribute("src"); a.load();
  } catch(e){}
  audioState = 1; _stopping = false;
  setStatus("", "Zatrzymane");
  updatePlayButton(1);
  updateCurrentTrack("");
}

function nextPrev(dir){
  if (!state.view.length) return;
  var idx = state.selectedIndex + dir;
  if (idx < 0) idx = state.view.length - 1;
  if (idx >= state.view.length) idx = 0;
  state.selectedIndex = idx;
  updateRowClasses();
  var r = rowEls[state.selectedIndex];
  if (r && r.scrollIntoView) r.scrollIntoView({ block: "nearest" });
  playSelected();
}

function toggleFavorite(id){
  if (!id) return;
  if (state.favorites[id]) delete state.favorites[id];
  else state.favorites[id] = 1;
  saveConfig();
  renderList();
}

function clearFilters(){
  state.filters.q = state.filters.country = state.filters.genre = "";
  state.filters.onlyFav = false;
  $("search").value = "";
  $("filterCountry").value = "";
  $("filterGenre").value = "";
  $("onlyFav").checked = false;
  $("onlyFavChip").classList.remove("active");
  state.selectedIndex = 0;
  renderList();
}

/* ══════════════════════════════════════════════════════════
   PLAYER EVENTS
══════════════════════════════════════════════════════════ */
function onPlayStateChange(ns){
  stopConnectTimer();
  if (ns === 3)       setStatus("ok", "Na żywo");
  else if (ns === 2)  setStatus("warn", "Wstrzymano");
  else if (ns === 6 || ns === 11) { setStatus("warn", "Buforowanie…"); armConnectTimer(); }
  else if (ns === 1)  setStatus("", "Zatrzymane");
  updatePlayButton(ns);
  renderList();
}
function onPlayerError(){
  stopConnectTimer();
  stopMetaPolling();
  setStatus("bad", "Błąd · Stream niedostępny");
  updatePlayButton(1);
}

/* ══════════════════════════════════════════════════════════
   ROW CLICK RESOLUTION
══════════════════════════════════════════════════════════ */
function resolveRow(target){
  var list = $("stationList"), el = target;
  while (el && el !== list) {
    if (el.getAttribute && el.getAttribute("data-row") === "1") return el;
    el = el.parentNode;
  }
  return null;
}

/* ══════════════════════════════════════════════════════════
   BINDINGS
══════════════════════════════════════════════════════════ */
function bindUi(){
  var _st = null;
  bind($("search"), "input", function(){
    clearTimeout(_st);
    _st = setTimeout(function(){
      state.filters.q = $("search").value || "";
      state.selectedIndex = 0;
      renderList();
    }, 180);
  });
  bind($("filterCountry"), "change", function(){ state.filters.country = $("filterCountry").value || ""; state.selectedIndex=0; renderList(); });
  bind($("filterGenre"),   "change", function(){ state.filters.genre   = $("filterGenre").value   || ""; state.selectedIndex=0; renderList(); });
  bind($("sortMode"),      "change", function(){ state.filters.sort    = $("sortMode").value      || "name"; saveConfig(); renderList(); });

  bind($("onlyFav"), "change", function(){
    state.filters.onlyFav = $("onlyFav").checked;
    $("onlyFavChip").classList.toggle("active", state.filters.onlyFav);
    state.selectedIndex = 0;
    renderList();
  });

  bind($("btnClear"),        "click", clearFilters);
  bind($("btnPlay"),         "click", togglePlayPause);
  bind($("btnStop"),         "click", stopPlayback);
  bind($("btnPrev"),         "click", function(){ nextPrev(-1); });
  bind($("btnNext"),         "click", function(){ nextPrev(1);  });
  bind($("btnResetStorage"), "click", function(){
    if (!window.confirm("Zresetować wszystkie ustawienia (ulubione, głośność, ostatnią stację)?")) return;
    try { localStorage.removeItem(STORAGE_KEY); } catch(e){}
    state.favorites = {};
    setVolume(65);
    renderList();
    setStatus("ok", "Ustawienia zresetowane");
  });

  bind($("volSlider"), "input", function(){ setVolume(+$("volSlider").value); });

  bind($("mpPlay"), "click", togglePlayPause);
  bind($("mpPrev"), "click", function(){ nextPrev(-1); });
  bind($("mpNext"), "click", function(){ nextPrev(1);  });

  bind($("stationList"), "click", function(e){
    var t = e.target, row = resolveRow(t), idx;
    if (!row) return;
    idx = parseInt(row.getAttribute("data-index"), 10);
    if (isNaN(idx) || !state.view[idx]) return;
    if (t && t.getAttribute && t.getAttribute("data-action") === "fav") {
      toggleFavorite(state.view[idx].id);
      return stopEvt(e);
    }
    state.selectedIndex = idx;
    updateRowClasses();
    if (isMobile()) playSelected();
  });
  bind($("stationList"), "dblclick", function(e){
    if (isMobile()) return;
    var t = e.target, row = resolveRow(t), idx;
    if (!row) return;
    idx = parseInt(row.getAttribute("data-index"), 10);
    if (isNaN(idx) || !state.view[idx]) return;
    if (t && t.getAttribute && t.getAttribute("data-action") === "fav") return stopEvt(e);
    state.selectedIndex = idx;
    updateRowClasses();
    playSelected();
    return stopEvt(e);
  });

  bind(document, "keydown", function(e){
    var key = e.keyCode || 0, src = e.target;
    var tag = src && src.tagName ? src.tagName.toLowerCase() : "";
    var typing = (tag === "input" || tag === "textarea" || tag === "select");
    var st;
    if (typing) { if (key === 27) { src.blur(); return stopEvt(e); } return; }
    if (key === 32) { togglePlayPause(); return stopEvt(e); }
    if (key === 13) { playSelected();    return stopEvt(e); }
    if (key === 83) { $("search").focus(); return stopEvt(e); }
    if (key === 38) { selectIndex(state.selectedIndex - 1, true); return stopEvt(e); }
    if (key === 40) { selectIndex(state.selectedIndex + 1, true); return stopEvt(e); }
    if (key === 37) { nextPrev(-1); return stopEvt(e); }
    if (key === 39) { nextPrev(1);  return stopEvt(e); }
    if (key === 70) { st = getSelectedStation(); if (st) toggleFavorite(st.id); }
    if (key === 27) { clearFilters(); return stopEvt(e); }
  });

  var _rt = null;
  window.addEventListener("resize", function(){ clearTimeout(_rt); _rt = setTimeout(renderList, 200); });
}

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
window.addEventListener("DOMContentLoaded", async function(){
  loadConfig();
  renderFilterOptions();
  $("onlyFav").checked = !!state.filters.onlyFav;
  $("onlyFavChip").classList.toggle("active", state.filters.onlyFav);
  getPlayer();
  setVolume(state.volume);
  updatePlayButton(1);
  bindUi();

  $("stationList").innerHTML =
    '<div class="loadingState"><span class="loadingPulse"></span>Ładowanie stacji…</div>';
  setStatus("warn", "Ładowanie stacji…");

  state.stations = await loadAllStations();

  if (state.activeId) {
    var st = getStationById(state.activeId);
    setNowPlaying(st || null);
    if (st) {
      renderList();
      for (var i = 0; i < state.view.length; i++) {
        if (state.view[i] && state.view[i].id === state.activeId) { state.selectedIndex = i; break; }
      }
    }
  } else {
    setNowPlaying(null);
  }

  renderFilterOptions();
  renderList();
  setStatus("", state.stations.length + " stacji gotowych");
});
</script>
</body>
</html>
